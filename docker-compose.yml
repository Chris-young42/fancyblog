services:
  mysql:
    image: mysql:8.0
    container_name: blog-mysql
    restart: unless-stopped
    env_file:
      - .env.prod
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p\"${MYSQL_ROOT_PASSWORD}\" --silent && mysqladmin ping -h localhost -u ${MYSQL_USER} -p\"${MYSQL_PASSWORD}\" --silent"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 60s
    networks:
      - blog-net

  db-init:
    build:
      context: ./packages/server
      dockerfile: Dockerfile
    container_name: blog-db-init
    restart: "no"
    command: ["sh", "-c", "for i in $(seq 1 30); do mysqladmin ping -h mysql -u ${MYSQL_USER} -p\"${MYSQL_PASSWORD}\" --silent && break || sleep 2; done && npx prisma db push --skip-generate && node prisma/seed.js"]
    env_file:
      - .env.prod
    environment:
      DATABASE_URL: mysql://${MYSQL_USER}:${MYSQL_PASSWORD}@mysql:3306/${MYSQL_DATABASE}
      NODE_ENV: production
    volumes:
      - ./packages/server/prisma/seed.js:/app/prisma/seed.js:ro
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - blog-net

  backend:
    build:
      context: ./packages/server
      dockerfile: Dockerfile
    container_name: blog-backend
    restart: unless-stopped
    env_file:
      - .env.prod
    environment:
      DATABASE_URL: mysql://${MYSQL_USER}:${MYSQL_PASSWORD}@mysql:3306/${MYSQL_DATABASE}
      PORT: 3000
      NODE_ENV: production
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
    depends_on:
      db-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - blog-net

  frontend:
    build:
      context: ./packages/blog-fancy
      dockerfile: Dockerfile
    container_name: blog-frontend
    restart: unless-stopped
    ports:
      - "3001:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - blog-net

  admin:
    build:
      context: ./packages/blog-mannagement
      dockerfile: Dockerfile
    container_name: blog-admin
    restart: unless-stopped
    ports:
      - "3002:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - blog-net

volumes:
  mysql_data:

networks:
  blog-net:
    driver: bridge
